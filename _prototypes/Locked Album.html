<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vendoors — Locked Album States</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="locked.css" />
<style>
  body { margin: 0; background: oklch(0.94 0.005 80); font-family: 'Inter', system-ui, sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="locked.jsx"></script>

<script type="text/babel">
const album = ALBUMS[0]; // No.142 Felted overcoat — charcoal

function App() {
  return (
    <DesignCanvas title="Vendoors — Locked album buyer states">
      <DCSection id="entry" title="Entry states — what a buyer sees on a locked album">
        <DCArtboard id="clean" label="A · Clean lock screen (default)" width={520} height={760}>
          <LockedClean album={album} />
        </DCArtboard>
        <DCArtboard id="wrong" label="B · Wrong password" width={520} height={760}>
          <LockedWrong album={album} />
        </DCArtboard>
        <DCArtboard id="unlocking" label="C · Unlocking" width={520} height={760}>
          <LockedUnlocking album={album} />
        </DCArtboard>
      </DCSection>

      <DCSection id="flow" title="Self-service access — buyer requests the password">
        <DCArtboard id="request" label="D · Request access form" width={580} height={840}>
          <LockedRequestAccess album={album} />
        </DCArtboard>
        <DCArtboard id="expired" label="E · Link expired" width={520} height={780}>
          <LockedExpired album={album} />
        </DCArtboard>
      </DCSection>

      <DCSection id="magic" title="Magic link — vendor sent this directly to one buyer">
        <DCArtboard id="magic" label="F · Personalized magic link (Atelier tier)" width={540} height={840}>
          <LockedMagicLink album={album} />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
