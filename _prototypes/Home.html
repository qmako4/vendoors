<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vendoors — A better gallery for vendors and buyers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="landing.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Home Landing">
<div id="root"></div>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="placeholder.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="landing.jsx"></script>
<script type="text/babel" src="auth.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "wordmark": "stack",
  "palette": "mono",
  "focus": "vendor",
  "showRibbon": true,
  "showHowItWorks": true,
  "showBuyers": true,
  "showFAQ": true
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [auth, setAuth] = useState({ open: false, mode: 'signup' });

  useEffect(() => {
    document.documentElement.dataset.palette = tweaks.palette;
  }, [tweaks.palette]);

  function openSignIn() { setAuth({ open: true, mode: 'signin' }); }
  function openSignUp() { setAuth({ open: true, mode: 'signup' }); }
  function closeAuth()  { setAuth(a => ({ ...a, open: false })); }
  function browse()     { window.location.href = 'Vendoors.html'; }

  return (
    <>
      <LpNav wordmark={tweaks.wordmark} onSignIn={openSignIn} onSignUp={openSignUp} />
      <LpHero focus={tweaks.focus} onSignUp={openSignUp} onBrowse={browse} />
      {tweaks.showRibbon && <LpRibbon />}
      {tweaks.showHowItWorks && <LpHowItWorks />}
      <LpVendorProps />
      <LpStats />
      {tweaks.showBuyers && <LpBuyers onBrowse={browse} />}
      {tweaks.showFAQ && <LpFAQ />}
      <LpFinalCTA onSignUp={openSignUp} onBrowse={browse} />
      <LpFooter />

      <AuthModal
        open={auth.open}
        mode={auth.mode}
        onClose={closeAuth}
        onSuccess={browse}
      />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Wordmark">
          <TweakRadio
            value={tweaks.wordmark}
            onChange={(v) => setTweak('wordmark', v)}
            options={[
              { value: 'square', label: '▦ Square' },
              { value: 'half', label: '◐ Half' },
              { value: 'stack', label: 'V Stacked' },
            ]}
          />
        </TweakSection>

        <TweakSection label="Gradient palette">
          <TweakRadio
            value={tweaks.palette}
            onChange={(v) => setTweak('palette', v)}
            options={[
              { value: 'default', label: 'Peach' },
              { value: 'cool', label: 'Lavender' },
              { value: 'warm', label: 'Cream' },
              { value: 'mono', label: 'Mono' },
            ]}
          />
        </TweakSection>

        <TweakSection label="Audience focus (hero)">
          <TweakRadio
            value={tweaks.focus}
            onChange={(v) => setTweak('focus', v)}
            options={[
              { value: 'vendor', label: 'Vendor' },
              { value: 'both', label: 'Both' },
              { value: 'buyer', label: 'Buyer' },
            ]}
          />
        </TweakSection>

        <TweakSection label="Sections">
          <TweakToggle label="Studio ribbon" value={tweaks.showRibbon} onChange={(v) => setTweak('showRibbon', v)} />
          <TweakToggle label="How it works" value={tweaks.showHowItWorks} onChange={(v) => setTweak('showHowItWorks', v)} />
          <TweakToggle label="Buyers section" value={tweaks.showBuyers} onChange={(v) => setTweak('showBuyers', v)} />
          <TweakToggle label="FAQ" value={tweaks.showFAQ} onChange={(v) => setTweak('showFAQ', v)} />
        </TweakSection>

        <TweakSection label="Demo">
          <TweakButton onClick={openSignUp}>Open signup modal</TweakButton>
          <TweakButton onClick={openSignIn}>Open signin modal</TweakButton>
          <TweakButton onClick={browse}>Go to archive →</TweakButton>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
